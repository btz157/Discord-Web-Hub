services:
  - type: web
    name: ws-store-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: >
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm run typecheck:libs &&
      BASE_PATH=/ pnpm --filter @workspace/bot-dashboard run build &&
      cp -r artifacts/bot-dashboard/dist/public artifacts/api-server/dist-frontend &&
      pnpm --filter @workspace/api-server run build &&
      mkdir -p artifacts/api-server/dist/public &&
      cp -r artifacts/api-server/dist-frontend/. artifacts/api-server/dist/public/
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: ws-store-db
    databaseName: wsstorebot
    plan: free
